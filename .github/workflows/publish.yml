name: Semantic Release & PyPI Publish

on:
  push:
    branches:
      - main # শুধুমাত্র প্রধান ব্রাঞ্চে পুশ হলেই এটি চেক করবে

jobs:
  check-and-publish:
    name: Build, Secure Publish & Release
    runs-on: ubuntu-latest
    concurrency: release
    
    environment:
      name: pypi
      url: https://pypi.org

    permissions:
      id-token: write # PyPI Trusted Publishing OIDC এর জন্য এটি বাধ্যতামূলক
      contents: write # গিটহাবে চেঞ্জলগ পুশ এবং ট্যাগ তৈরির জন্য

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build python-semantic-release

      # ধাপ ১: গিট কমিট দেখে ড্রাই-রান করা
      - name: Check if release is needed
        id: check_release
        run: |
          semantic-release --strict --noop version > release_output.txt 2>&1
          cat release_output.txt
          
          if grep -q -E "No release|No change|no version change" release_output.txt; then
            echo "released=false" >> $GITHUB_OUTPUT
          else
            echo "released=true" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 🌟 ধাপ ২: লোকাল ফাইলের (pyproject.toml) ভার্সন নম্বর নতুন ভার্সনে আপডেট করা
      - name: Update Version Files Locally
        if: steps.check_release.outputs.released == 'true'
        run: |
          semantic-release --strict version --no-changelog --no-commit --no-tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 🌟 ধাপ ৩: নতুন ও সঠিক ভার্সন নম্বর দিয়ে পাইথন প্যাকেজ (.whl এবং sdist) বিল্ড করা
      - name: Build package distribution
        if: steps.check_release.outputs.released == 'true'
        run: python -m build

      # 🌟 ধাপ ৪: PyPI-তে নতুন ফাইলটি সফলভাবে আপলোড করা
      - name: Publish package distributions to PyPI
        if: steps.check_release.outputs.released == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1

      # 🌟 ধাপ ৫: PyPI-তে আপলোড সফল হওয়ার পর গিটহাবে ফাইনাল Changelog, Commit এবং Tag পুশ করা
      - name: Python Semantic Release (Tag & Changelog Push)
        if: steps.check_release.outputs.released == 'true'
        run: |
          # এরর এড়াতে ভুল অপশনটি সরিয়ে শুধু রিলিজের মূল কমান্ডটি দেওয়া হয়েছে
          semantic-release --strict version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
