name: Semantic Release & PyPI Publish

on:
  push:
    branches:
      - main # শুধুমাত্র প্রধান ব্রাঞ্চে পুশ হলেই এটি চেক করবে

jobs:
  check-and-publish:
    name: Build, Secure Publish & Release
    runs-on: ubuntu-latest
    concurrency: release
    
    environment:
      name: pypi
      url: https://pypi.org

    permissions:
      id-token: write # PyPI Trusted Publishing OIDC এর জন্য এটি বাধ্যতামূলক
      contents: write # গিটহাবে চেঞ্জলগ পুশ এবং ট্যাগ তৈরির জন্য

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@://github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build python-semantic-release

      # ধাপ ১: গিট কমিট দেখে ড্রাই-রান করা (কোনো --patch নেই, এটি স্বয়ংক্রিয়ভাবে ট্র্যাক করবে)
      - name: Check if release is needed
        id: check_release
        run: |
          semantic-release --strict --noop version > release_output.txt 2>&1
          cat release_output.txt
          
          if grep -q -E "No release|No change|no version change" release_output.txt; then
            echo "released=false" >> $GITHUB_OUTPUT
          else
            echo "released=true" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ধাপ ২: গিট কমিটের ওপর ভিত্তি করে লোকাল ফাইলগুলোর ভার্সন নম্বর স্বয়ংক্রিয়ভাবে আপডেট করা
      - name: Update Version Files Locally
        if: steps.check_release.outputs.released == 'true'
        run: |
          # এটি কমিট মেসেজ অনুযায়ী pyproject.toml-এ নতুন ভার্সন (যেমন ১.১.০) রাইট করবে
          semantic-release --strict version --no-changelog --no-git-commit-hooks --no-tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ধাপ ৩: এখন নতুন ও সঠিক ভার্সন নম্বর দিয়ে প্যাকেজ ডিস্ট্রিবিউশন বিল্ড করা
      - name: Build package distribution
        if: steps.check_release.outputs.released == 'true'
        run: python -m build

      # 🌟 ধাপ ৪: PyPI-তে নতুন ফাইলটি সফলভাবে আপলোড করা (কোনো ডুপ্লিকেট ফাইল এরর আসবে না)
      - name: Publish package distributions to PyPI
        if: steps.check_release.outputs.released == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1

      # ধাপ ৫: PyPI-তে আপলোড সফল হওয়ার পর গিটহাবে Changelog, Commit এবং Tag পুশ করা
      - name: Python Semantic Release (Tag & Changelog Push)
        if: steps.check_release.outputs.released == 'true'
        run: |
          semantic-release --strict version --no-vcs-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
